name: Build Tinyland Caldera Image

# Tinyland-specific build pipeline. Disjoint from upstream's
# .github/workflows/publish_docker_image.yml — both can co-exist; that one
# pushes ghcr.io/mitre/caldera:latest, this one pushes ghcr.io/tinyland-inc/caldera.
#
# Pattern cribbed from tinyland-inc/GloriousFlywheel/.github/workflows/build-image.yml.
# Uses self-hosted runners (tinyland-dind for buildx, tinyland-nix for flake).
#
# Linear: TIN-971

on:
  push:
    branches:
      - master
      - "tinyland/**"
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "requirements.txt"
      - ".gitmodules"
      - "app/**"
      - "conf/**"
      - "server.py"
      - "static/**"
      - "templates/**"
      - "plugins/**"
      - ".github/workflows/build-tinyland-image.yml"
  pull_request:
    branches:
      - master
      - "tinyland/**"
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - ".gitmodules"
      - "app/**"
      - "plugins/**"
      - ".github/workflows/build-tinyland-image.yml"
  workflow_dispatch:
    inputs:
      variant:
        description: "Image variant"
        required: true
        default: "slim"
        type: choice
        options:
          - slim
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless via Sigstore OIDC

env:
  REGISTRY: ghcr.io
  # Image namespace tracks the source repo namespace. The GitHub-issued
  # GITHUB_TOKEN can publish to ghcr.io/<repo-owner>/* without extra perms;
  # crossing into ghcr.io/tinyland-inc/* requires either an org PAT secret
  # or moving the source repo. Phase 1 keeps things working with the
  # default token; Phase 2 deploys reference the same registry path.
  #
  # OCI repo names must be lowercase. github.repository_owner preserves the
  # account's display casing (e.g. Jesssullivan), so we lowercase it here.
  # IMAGE_NAME is computed in the build job to keep it derived from the run
  # context; can't use ${{}} expressions in env at workflow level for funcs.
  # Phase 1 ships slim by default — fast iteration, network-attached deploy.
  # Bump to full once we want offline atomic/emu support (separate Linear).
  VARIANT: ${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'slim' }}

jobs:
  build:
    name: Build & sign Caldera image
    # `tinyland-dind` is the workflow-facing capability label across the
    # cluster — every overlay stack hardcodes it (the helm release names
    # are what differ per overlay; see jesssullivan-infra/tofu/stacks/
    # arc-runners/jesssullivan.tfvars `extra_runner_sets`).
    runs-on: tinyland-dind

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          IS_MASTER: ${{ github.ref == 'refs/heads/master' }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # OCI repo names must be lowercase; GitHub preserves owner casing.
          owner_lc="${REPO_OWNER,,}"
          image_name="${owner_lc}/caldera"
          ref_slug="${REF_NAME//\//-}"
          short_sha="${SHA::12}"
          base="${REGISTRY}/${image_name}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"
          echo "image_base=${base}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            echo "${base}:${VARIANT}-${short_sha}"
            echo "${base}:${VARIANT}-${ref_slug}"
            if [[ "${IS_MASTER}" == "true" ]]; then
              echo "${base}:${VARIANT}-master"
              if [[ "${VARIANT}" == "full" ]]; then
                echo "${base}:latest"
              fi
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          build-args: |
            VARIANT=${{ env.VARIANT }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=caldera-${{ env.VARIANT }}
          cache-to: type=gha,mode=max,scope=caldera-${{ env.VARIANT }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Tinyland fork of MITRE Caldera (${{ env.VARIANT }} variant) with patched SAML plugin support and xmlsec native libs.
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=caldera
            org.opencontainers.image.version=${{ env.VARIANT }}-${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
            tinyland.fork=true
            tinyland.upstream=https://github.com/mitre/caldera

      - name: Restore Trivy cache
        if: github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-cache-${{ runner.os }}-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            trivy-cache-${{ runner.os }}-

      - name: Scan image for CRITICAL vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.tags.outputs.image_base }}@${{ steps.build.outputs.digest }}
          cache: false
          cache-dir: ${{ github.workspace }}/.cache/trivy
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST_REF: ${{ steps.tags.outputs.image_base }}@${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          cosign sign --yes "${DIGEST_REF}"
          cosign verify \
            --certificate-identity-regexp "https://github.com/.+/caldera/\.github/workflows/build-tinyland-image\.yml@.+" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${DIGEST_REF}"

      - name: Summarize image
        if: always()
        shell: bash
        run: |
          {
            echo "## Caldera image — variant: ${VARIANT}"
            echo
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              [[ -n "$tag" ]] && echo "  - \`$tag\`"
            done <<< "${{ steps.tags.outputs.tags }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  flake-check:
    name: Validate flake
    runs-on: tinyland-nix
    steps:
      - uses: actions/checkout@v6

      # The tinyland-nix runner image ships a baked-in multi-user Nix at
      # /nix/var/nix/profiles/default/bin/nix, but the multi-user nix-daemon
      # isn't started in the ephemeral pod, and the runner UID lacks direct
      # access to the system store DB lock — raw `nix` invocations fail with
      # "opening lock file /nix/var/nix/db/big-lock: Permission denied".
      #
      # Sidestep entirely by pointing nix at a private user-owned store
      # under $HOME. Eval-only operations (`flake check --no-build`) don't
      # need the system store; this keeps the job hermetic and avoids the
      # need for sudo or a daemon hand-start.
      - name: Validate flake (no build, eval-only)
        shell: bash
        env:
          NIX_CONFIG: |
            experimental-features = nix-command flakes
        run: |
          set -euo pipefail
          PRIV_STORE="$RUNNER_TEMP/nix-priv"
          mkdir -p "$PRIV_STORE"
          nix \
            --store "local?root=$PRIV_STORE" \
            --extra-experimental-features 'nix-command flakes' \
            flake check --no-build --print-build-logs
