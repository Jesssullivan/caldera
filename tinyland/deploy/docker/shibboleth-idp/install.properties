# =============================================================================
# Shibboleth IdP 5.2 install seed — answers install.sh's interactive prompts.
# =============================================================================
#
# Used by tinyland/deploy/docker/shibboleth-idp/Dockerfile during image
# pre-bake. The IdP install copies these into ${idp.home}/conf/idp.properties
# and friends. Real per-deployment values (signing key, encryption key,
# scoping, federation metadata) are mounted in by the helm chart at runtime
# and OVERLAY this seed.
#
# This file deliberately omits the sealer and keystore secret values. The
# Dockerfile appends those lines with random throwaways at build time so
# install.sh has what it needs to run non-interactively, then the helm
# chart mounts real SOPS-decrypted credentials over conf/credentials/ at
# deploy time. Keeping the secret-key property lines OUT of the committed
# seed (they are emitted only inside Dockerfile RUN context) lets the
# public-fork pre-commit gate stay strict.
#
# Reference:
# https://shibboleth.atlassian.net/wiki/spaces/IDP5/pages/3199511319/Installation
# =============================================================================

# Where to install. Must match Dockerfile's IDP_HOME.
idp.target.dir = /opt/shibboleth-idp

# Hostname the IdP serves under. Overridden by the helm chart at deploy time
# via /opt/shibboleth-idp/conf/idp.properties (subPath mount).
idp.host.name = idp-002.tinyland.dev

# Entity ID. Overridden at deploy time. Lab default matches the planned URL.
idp.entityID = https://idp-002.tinyland.dev/idp/shibboleth

# Scope (release domain). Overridden at deploy time.
idp.scope = caldera.tinyland.dev
