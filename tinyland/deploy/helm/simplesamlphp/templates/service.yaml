apiVersion: v1
kind: Service
metadata:
  name: {{ include "simplesamlphp.fullname" . }}
  labels: {{- include "simplesamlphp.labels" . | nindent 4 }}
  {{- if .Values.service.tailscale.enabled }}
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: {{ .Values.service.tailscale.hostname | quote }}
    {{- if .Values.service.tailscale.proxyClass }}
    tailscale.com/proxy-class: {{ .Values.service.tailscale.proxyClass | quote }}
    {{- end }}
    {{- if .Values.service.tailscale.https }}
    tailscale.com/https: "true"
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "simplesamlphp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
