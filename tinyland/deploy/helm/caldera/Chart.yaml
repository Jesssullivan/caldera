apiVersion: v2
name: caldera
description: |
  MITRE Caldera — adversary-emulation platform. This chart is the Tinyland
  fork's on-prem deployment shape: single-replica, RWO PVC, Recreate
  strategy, optional Tailscale-operator + cert-manager wiring. Written for
  the Tinyland fork at github.com/Jesssullivan/caldera but works with any
  upstream-compatible Caldera image as long as the SAML plugin's xmlsec
  native deps are present.
type: application
version: 0.1.0
