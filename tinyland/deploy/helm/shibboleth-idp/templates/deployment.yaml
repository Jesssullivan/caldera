apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shibboleth-idp.fullname" . }}
  labels: {{- include "shibboleth-idp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "shibboleth-idp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "shibboleth-idp.selectorLabels" . | nindent 8 }}
        {{- with .Values.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "shibboleth-idp.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: idp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: {{ .Values.javaOpts | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          # IdP startup is heavy: Jetty + Shibboleth + module wiring takes
          # 30-60s on cold start. Generous startupProbe so kubelet doesn't
          # kill the pod mid-boot.
          #
          # Probe path: /idp/ (the IdP's branding/landing page) returns 200
          # once Spring is up and serving. /idp/status would be the more
          # rigorous health check but it's IP-restricted to 127.0.0.1 by
          # default (idp.properties: idp.status.accessPolicy=AccessByIPAddress
          # with localhost-only allowlist), so probing it from kubelet on
          # the node IP returns 500. Tightening the access policy is a
          # follow-up if we want a richer probe target.
          startupProbe:
            httpGet:
              path: /idp/
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /idp/
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /idp/
              port: http
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            # Per-deployment XML config (attribute-resolver, attribute-filter,
            # metadata-providers, relying-party). Provided by var.idp_config
            # via a ConfigMap; rendered by tofu from .xml templates that
            # reference the IdP's federation peers + caldera SP entity ID.
            #
            # subPath mounts: a directory mount at /opt/shibboleth-idp/conf
            # would shadow the image-baked idp.properties + dozen other
            # config files, breaking IdP startup. subPath mounts replace
            # ONLY our four overrides and leave everything else intact.
            {{- if .Values.idpConfig.configMapName }}
            - name: idp-config
              mountPath: /opt/shibboleth-idp/conf/attribute-resolver.xml
              subPath: attribute-resolver.xml
              readOnly: true
            - name: idp-config
              mountPath: /opt/shibboleth-idp/conf/attribute-filter.xml
              subPath: attribute-filter.xml
              readOnly: true
            - name: idp-config
              mountPath: /opt/shibboleth-idp/conf/metadata-providers.xml
              subPath: metadata-providers.xml
              readOnly: true
            - name: idp-config
              mountPath: /opt/shibboleth-idp/conf/relying-party.xml
              subPath: relying-party.xml
              readOnly: true
            {{- end }}
            # IdP signing + encryption keypairs. subPath again — a
            # directory mount would shadow the image-baked sealer.jks
            # (which we do NOT carry in the SOPS bundle; see
            # phase-4-shibboleth-plan.md §3 on sealer rotation).
            {{- if .Values.idpCredentials.secretName }}
            - name: idp-credentials
              mountPath: /opt/shibboleth-idp/credentials/idp-signing.crt
              subPath: idp-signing.crt
              readOnly: true
            - name: idp-credentials
              mountPath: /opt/shibboleth-idp/credentials/idp-signing.key
              subPath: idp-signing.key
              readOnly: true
            - name: idp-credentials
              mountPath: /opt/shibboleth-idp/credentials/idp-encryption.crt
              subPath: idp-encryption.crt
              readOnly: true
            - name: idp-credentials
              mountPath: /opt/shibboleth-idp/credentials/idp-encryption.key
              subPath: idp-encryption.key
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.idpConfig.configMapName }}
        - name: idp-config
          configMap:
            name: {{ .Values.idpConfig.configMapName }}
        {{- end }}
        {{- if .Values.idpCredentials.secretName }}
        - name: idp-credentials
          secret:
            secretName: {{ .Values.idpCredentials.secretName }}
            defaultMode: 0400
        {{- end }}
